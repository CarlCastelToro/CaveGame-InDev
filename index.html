<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CaveGame</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#blocker {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: flex; align-items: center;
  justify-content: center; cursor: pointer; z-index: 10;
}
#blocker span { color: #fff; font: 24px sans-serif; }
#crosshair {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; pointer-events: none; z-index: 5;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: #fff;
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
</style>
</head>
<body>
<div id="blocker"><span>Click to Play</span></div>
<div id="crosshair"></div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const GRAVITY = -25;
const JUMP_SPEED = 10;
const MOVE_SPEED = 8;
const PLAYER_HEIGHT = 1.6;

// Collision system constants
const PLAYER_WIDTH = 0.6;
const PLAYER_DEPTH = 0.6;
const PLAYER_HEIGHT_COLLISION = 1.8;

// Block registry for collision detection
const blocks = new Set();

function posToKey(x, y, z) {
  return `${x},${y},${z}`;
}

function hasBlock(x, y, z) {
  return blocks.has(posToKey(x, y, z));
}

function addBlock(x, y, z) {
  blocks.add(posToKey(x, y, z));
}

function removeBlock(x, y, z) {
  blocks.delete(posToKey(x, y, z));
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 80, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(30, 50, 30);
dirLight.castShadow = true;
dirLight.shadow.camera.left = -80;
dirLight.shadow.camera.right = 80;
dirLight.shadow.camera.top = 80;
dirLight.shadow.camera.bottom = -80;
dirLight.shadow.mapSize.set(2048, 2048);
scene.add(dirLight);

// Bedrock texture for ground
const bedrockCanvas = document.createElement('canvas');
bedrockCanvas.width = bedrockCanvas.height = 16;
const bCtx = bedrockCanvas.getContext('2d');
for (let x = 0; x < 16; x++) {
  for (let y = 0; y < 16; y++) {
    const v = 20 + Math.random() * 30;
    bCtx.fillStyle = `rgb(${v},${v},${v})`;
    bCtx.fillRect(x, y, 1, 1);
  }
}
const bedrockTex = new THREE.CanvasTexture(bedrockCanvas);
bedrockTex.magFilter = THREE.NearestFilter;
bedrockTex.wrapS = bedrockTex.wrapT = THREE.RepeatWrapping;
bedrockTex.repeat.set(80, 80);

const groundGeo = new THREE.BoxGeometry(160, 1, 160);
const groundMat = new THREE.MeshStandardMaterial({ map: bedrockTex });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Generate 3 layers of stone blocks above entire ground
const stoneBlockGeo = new THREE.BoxGeometry(1, 1, 1);
const stoneBlockMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
const groundSize = 160;
const halfGroundSize = groundSize / 2;

for (let x = -halfGroundSize; x < halfGroundSize; x++) {
  for (let z = -halfGroundSize; z < halfGroundSize; z++) {
    for (let y = 0; y < 3; y++) {
      const block = new THREE.Mesh(stoneBlockGeo, stoneBlockMat);
      block.position.set(x + 0.5, y + 0.5, z + 0.5);
      block.castShadow = true;
      block.receiveShadow = true;
      scene.add(block);
      addBlock(x, y, z);
    }
  }
}

const pitch = new THREE.Object3D();
pitch.position.y = PLAYER_HEIGHT;
pitch.rotation.order = 'YXZ';

const player = new THREE.Group();
player.add(pitch);
pitch.add(camera);
player.position.y = 3; // Spawn on top of 3 stone layers
scene.add(player);

let velocityY = 0;
let onGround = false;
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

const blocker = document.getElementById('blocker');
let locked = false;
blocker.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  blocker.style.display = locked ? 'none' : 'flex';
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  player.rotation.y -= e.movementX * 0.002;
  pitch.rotation.x -= e.movementY * 0.002;
  pitch.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch.rotation.x));
});

function update(dt) {
  const dir = new THREE.Vector3();
  if (keys['KeyW']) dir.z -= 1;
  if (keys['KeyS']) dir.z += 1;
  if (keys['KeyA']) dir.x -= 1;
  if (keys['KeyD']) dir.x += 1;
  
  if (dir.length() > 0) {
    dir.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);
    const moveX = dir.x * MOVE_SPEED * dt;
    const moveZ = dir.z * MOVE_SPEED * dt;
    
    // Try moving in X direction
    const oldX = player.position.x;
    player.position.x += moveX;
    if (checkCollision(player.position)) {
      player.position.x = oldX; // revert
    }
    
    // Try moving in Z direction
    const oldZ = player.position.z;
    player.position.z += moveZ;
    if (checkCollision(player.position)) {
      player.position.z = oldZ; // revert
    }
  }
  
  // Jump and gravity
  if (keys['Space'] && onGround) {
    velocityY = JUMP_SPEED;
    onGround = false;
  }
  
  velocityY += GRAVITY * dt;
  const oldY = player.position.y;
  player.position.y += velocityY * dt;
  
  // Check collision with blocks
  if (checkCollision(player.position)) {
    // Revert Y position
    player.position.y = oldY;
    velocityY = 0;
    onGround = true;
  }
  
  // Ground collision
  if (player.position.y <= 0) {
    player.position.y = 0;
    velocityY = 0;
    onGround = true;
  }
}

const raycaster = new THREE.Raycaster();
const blockGeo = new THREE.BoxGeometry(1, 1, 1);
const blockMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });

function getBlockIntersects() {
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  return raycaster.intersectObjects(scene.children, false).filter(i => i.object !== ground);
}

function getGroundIntersect() {
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const hits = raycaster.intersectObject(ground);
  return hits.length > 0 ? hits[0] : null;
}

function placeBlock(pos) {
  const x = Math.floor(pos.x);
  const y = Math.floor(pos.y);
  const z = Math.floor(pos.z);
  
  // Check if block would collide with player
  const blockAABB = getBlockAABB(x, y, z);
  const playerAABB = getPlayerAABB(player.position);
  if (aabbIntersect(playerAABB, blockAABB)) {
    return; // Cannot place block here
  }
  
  const block = new THREE.Mesh(blockGeo, blockMat);
  block.position.copy(pos);
  block.castShadow = true;
  block.receiveShadow = true;
  scene.add(block);
  addBlock(x, y, z);
}

// Collision detection functions
function getPlayerAABB(pos) {
  const halfWidth = PLAYER_WIDTH / 2;
  const halfDepth = PLAYER_DEPTH / 2;
  return {
    minX: pos.x - halfWidth,
    maxX: pos.x + halfWidth,
    minY: pos.y,
    maxY: pos.y + PLAYER_HEIGHT_COLLISION,
    minZ: pos.z - halfDepth,
    maxZ: pos.z + halfDepth
  };
}

function getBlockAABB(x, y, z) {
  return {
    minX: x,
    maxX: x + 1,
    minY: y,
    maxY: y + 1,
    minZ: z,
    maxZ: z + 1
  };
}

function aabbIntersect(a, b) {
  return a.minX < b.maxX && a.maxX > b.minX &&
         a.minY < b.maxY && a.maxY > b.minY &&
         a.minZ < b.maxZ && a.maxZ > b.minZ;
}

function checkCollision(pos) {
  const playerAABB = getPlayerAABB(pos);
  const minBX = Math.floor(playerAABB.minX);
  const maxBX = Math.floor(playerAABB.maxX);
  const minBY = Math.floor(playerAABB.minY);
  const maxBY = Math.floor(playerAABB.maxY);
  const minBZ = Math.floor(playerAABB.minZ);
  const maxBZ = Math.floor(playerAABB.maxZ);
  
  for (let x = minBX; x <= maxBX; x++) {
    for (let y = minBY; y <= maxBY; y++) {
      for (let z = minBZ; z <= maxBZ; z++) {
        if (hasBlock(x, y, z)) {
          const blockAABB = getBlockAABB(x, y, z);
          if (aabbIntersect(playerAABB, blockAABB)) {
            return { x, y, z, blockAABB };
          }
        }
      }
    }
  }
  return null;
}

document.addEventListener('mousedown', e => {
  if (!locked) return;
  const blockHits = getBlockIntersects();
  if (blockHits.length > 0) {
    const hit = blockHits[0];
    if (e.button === 0) {
      const pos = hit.object.position;
      removeBlock(Math.floor(pos.x), Math.floor(pos.y), Math.floor(pos.z));
      scene.remove(hit.object);
    } else if (e.button === 2) {
      const newPos = hit.object.position.clone().add(hit.face.normal);
      placeBlock(newPos);
    }
  } else {
    const groundHit = getGroundIntersect();
    if (groundHit && e.button === 2) {
      const pos = groundHit.point.clone().floor().addScalar(0.5);
      pos.y = 0.5;
      placeBlock(pos);
    }
  }
});

document.addEventListener('contextmenu', e => e.preventDefault());

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  update(Math.min(clock.getDelta(), 0.05));
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
